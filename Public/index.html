<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador IBO Player</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; color: #666; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #218838; }
        #status { margin-top: 1rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ativar Playlists</h2>
        <div class="form-group">
            <label>MAC Address</label>
            <input type="text" id="mac" placeholder="00:00:00:00:00:00">
        </div>
        <div class="form-group">
            <label>Device Key</label>
            <input type="text" id="key" placeholder="123456">
        </div>
        <div class="form-group">
            <label>Usuário IPTV</label>
            <input type="text" id="user" placeholder="Seu usuário">
        </div>
        <div class="form-group">
            <label>Senha IPTV</label>
            <input type="password" id="pass" placeholder="Sua senha">
        </div>
        <button onclick="enviar()">Ativar Agora</button>
        <div id="status"></div>
    </div>

    <script>
        async function enviar() {
            const status = document.getElementById('status');
            const data = {
                mac: document.getElementById('mac').value,
                key: document.getElementById('key').value,
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value
            };

            status.innerText = "Enviando para a fila...";
            status.style.color = "blue";

            try {
                const res = await fetch('/ativar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    status.innerText = "Sucesso! Aguarde alguns minutos.";
                    status.style.color = "green";
                } else {
                    status.innerText = "Erro ao enviar dados.";
                    status.style.color = "red";
                }
            } catch (err) {
                status.innerText = "Erro de conexão.";
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
