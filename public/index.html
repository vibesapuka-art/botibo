<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ativação - ImperiumTv</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; width: 95%; max-width: 420px; text-align: center; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .apps-container { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .app-option { 
            border: 2px solid #333; padding: 10px; border-radius: 15px; cursor: pointer; 
            transition: 0.3s; width: 110px; opacity: 0.5; background: #1a1a1a;
        }
        .app-option img { width: 100%; border-radius: 10px; margin-bottom: 8px; }
        .app-option p { margin: 0; font-size: 0.75rem; font-weight: bold; }
        .app-option.active { border-color: #00ff88; opacity: 1; transform: scale(1.05); background: #222; box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ff88; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: #00ff88; color: #000; font-size: 1rem; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        #progressArea, #captchaArea { display: none; margin-top: 25px; }
        .bar-bg { width: 100%; height: 14px; background: #222; border-radius: 10px; overflow: hidden; margin: 12px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s ease-in-out; background: #00ff88; }
        #log-msg { font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#00ff88; margin:0;">ImperiumTv</h2>
        <p style="color:#888; font-size: 0.9rem;">Selecione o App da sua TV</p>
        
        <div class="apps-container">
            <div class="app-option active" id="opt-pro" onclick="selectApp('ibopro')">
                <img src="https://iboproapp.com/logo.png">
                <p>IBO PRO</p>
            </div>
            <div class="app-option" id="opt-com" onclick="selectApp('ibocom')">
                <img src="https://iboplayer.com/logo.png">
                <p>IBO PLAYER</p>
            </div>
        </div>

        <div id="form-ativacao">
            <input type="text" id="mac" placeholder="MAC Address (Ex: 00:00:00...)">
            <input type="text" id="key" placeholder="Device Key / Password">
            <input type="text" id="user" placeholder="Usuário IPTV">
            <input type="password" id="pass" placeholder="Senha IPTV">
            <button onclick="iniciar()">INICIAR ATIVAÇÃO</button>
        </div>

        <div id="captchaArea">
            <p style="color:#ffbb33; font-weight: bold;">Verificação de Segurança:</p>
            <img id="img-captcha" src="" style="width:180px; border-radius:8px; margin-bottom:15px; border: 1px solid #444;">
            <input type="text" id="input-captcha" placeholder="Digite o código da imagem">
            <button onclick="enviarCaptcha()" style="background:#fff">CONFIRMAR</button>
        </div>

        <div id="progressArea">
            <div id="status-main" style="font-weight:bold; color:#00ff88; margin-bottom: 5px;">Aguardando...</div>
            <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
            <div id="log-msg">Conectando ao servidor...</div>
        </div>
    </div>

    <script>
        let selectedTipo = 'ibopro';

        function selectApp(tipo) {
            selectedTipo = tipo;
            document.getElementById('opt-pro').classList.toggle('active', tipo === 'ibopro');
            document.getElementById('opt-com').classList.toggle('active', tipo === 'ibocom');
        }

        async function iniciar() {
            const mac = document.getElementById('mac').value.trim();
            if(!mac) return alert("Por favor, preencha o MAC.");

            document.getElementById('form-ativacao').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mac, 
                    key: document.getElementById('key').value,
                    user: document.getElementById('user').value,
                    pass: document.getElementById('pass').value,
                    tipo: selectedTipo
                })
            });

            monitorar(mac);
        }

        function monitorar(mac) {
            const timer = setInterval(async () => {
                try {
                    const res = await fetch(`/status?mac=${mac}`);
                    const data = await res.json();

                    if(data.status === "aguardando_captcha") {
                        document.getElementById('progressArea').style.display = 'none';
                        document.getElementById('captchaArea').style.display = 'block';
                        document.getElementById('img-captcha').src = data.captchaBase64;
                    } else if (data.status === "processando" || data.status === "pendente" || data.status === "ok") {
                        document.getElementById('captchaArea').style.display = 'none';
                        document.getElementById('progressArea').style.display = 'block';
                    }

                    document.getElementById('status-main').innerText = data.status.toUpperCase();
                    document.getElementById('log-msg').innerText = data.mensagem;
                    
                    // ATUALIZAÇÃO DA BARRA
                    if (data.total > 0) {
                        let percent = (data.indiceAtual / data.total) * 100;
                        document.getElementById('bar').style.width = percent + "%";
                    }

                    if(data.status === "ok") {
                        clearInterval(timer);
                        document.getElementById('bar').style.width = "100%";
                    }
                    if(data.status === "erro") clearInterval(timer);

                } catch (e) { console.error("Erro ao monitorar"); }
            }, 3000);
        }

        async function enviarCaptcha() {
            const mac = document.getElementById('mac').value;
            const texto = document.getElementById('input-captcha').value;
            await fetch('/resolver-captcha', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mac, texto })
            });
            document.getElementById('captchaArea').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('status-main').innerText = "RETOMANDO...";
        }
    </script>
</body>
</html>
