<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium Bot IBO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container-main { width: 100%; max-width: 400px; background-color: #1c1c1e; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #2ecc71; font-weight: bold; font-style: italic; text-align: center; margin-bottom: 25px; font-size: 28px; }
        
        /* Abas Estilo Imagem */
        .nav-tabs-custom { display: flex; background: #2c2c2e; border-radius: 12px; padding: 4px; margin-bottom: 25px; border: none; }
        .nav-item-custom { flex: 1; border: none; background: none; color: #8e8e93; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item-custom.active-ativar { background: #3a3a3c; color: white; } /* Cor cinza para NOVO/ASSINANTE */
        .nav-item-custom.active-limpar { background: #e74c3c; color: white; } /* Cor vermelha para LIMPAR */
        .nav-item-custom.active-blue { background: #3498db; color: white; }

        label { color: #2ecc71; font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .form-control { background-color: #2c2c2e; border: none; border-radius: 10px; color: white; padding: 12px; margin-bottom: 15px; font-size: 16px; }
        .form-control:focus { background-color: #3a3a3c; color: white; box-shadow: none; border: 1px solid #2ecc71; }
        
        /* Botões Estilo Imagem */
        .btn-executar { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-red { background-color: #c0392b; color: white; }
        .btn-blue { background-color: #2980b9; color: white; }
        
        .status-container { text-align: center; margin-top: 30px; border-top: 1px solid #2c2c2e; padding-top: 20px; }
        .status-title { color: #2ecc71; font-weight: bold; font-size: 20px; margin-bottom: 5px; text-transform: uppercase; }
        .status-msg { color: #8e8e93; font-size: 14px; font-style: italic; }
    </style>
</head>
<body>

<div class="container-main">
    <h1>IMPERIUM BOT IBO</h1>
    
    <div class="nav-tabs-custom">
        <button class="nav-item-custom" id="tab-novo" onclick="setTipo('ativar')">NOVO</button>
        <button class="nav-item-custom" id="tab-assinante" onclick="setTipo('ibopro')">ASSINANTE</button>
        <button class="nav-item-custom active-limpar" id="tab-limpar" onclick="setTipo('limpar')">LIMPAR</button>
    </div>

    <label id="label-id">IDENTIFICAÇÃO DO APARELHO</label>
    <input type="text" id="mac" class="form-control" placeholder="MAC Address">
    <input type="text" id="key" class="form-control" placeholder="Device Key">

    <div id="campos-iptu" style="display: none;">
        <input type="text" id="usuario" class="form-control" placeholder="Usuário IPTV">
        <input type="text" id="senha" class="form-control" placeholder="Senha IPTV">
    </div>

    <button id="btn-main" class="btn-executar btn-red" onclick="enviarComando()">
        EXECUTAR LIMPEZA PROFUNDA
    </button>

    <div class="status-container">
        <div class="status-title">PROCESSANDO</div>
        <div class="status-msg" id="status-msg">Aguardando comando...</div>
    </div>
</div>

<script>
    let tipoAtual = 'limpar';
    let monitoramento = null;

    function setTipo(tipo) {
        tipoAtual = tipo;
        const btn = document.getElementById('btn-main');
        const extras = document.getElementById('campos-iptu');
        const tabs = document.querySelectorAll('.nav-item-custom');
        
        tabs.forEach(t => t.className = 'nav-item-custom'); // Reset

        if (tipo === 'limpar') {
            document.getElementById('tab-limpar').classList.add('active-limpar');
            btn.innerText = 'EXECUTAR LIMPEZA PROFUNDA';
            btn.className = 'btn-executar btn-red';
            extras.style.display = 'none';
        } else {
            const activeClass = tipo === 'ativar' ? 'active-ativar' : 'active-blue';
            document.getElementById(tipo === 'ativar' ? 'tab-novo' : 'tab-assinante').classList.add(activeClass);
            
            btn.innerText = tipo === 'ativar' ? 'ATIVAR NOVO' : 'REATIVAR CADASTRO';
            btn.className = tipo === 'ativar' ? 'btn-executar btn-blue' : 'btn-executar btn-blue';
            extras.style.display = 'block';
        }
    }

    async function enviarComando() {
        const mac = document.getElementById('mac').value;
        const key = document.getElementById('key').value;
        const usuario = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;

        if (!mac || !key) return alert("Preencha MAC e KEY!");

        document.getElementById('status-msg').innerText = "Enviando comando...";

        try {
            const response = await fetch('/ativar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac, key, usuario, senha, tipo: tipoAtual })
            });

            if (response.ok) {
                checarStatus(mac);
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Erro de conexão!";
        }
    }

    function checarStatus(mac) {
        if (monitoramento) clearInterval(monitoramento);
        monitoramento = setInterval(async () => {
            try {
                const res = await fetch(`/status?mac=${mac}`);
                const data = await res.json();
                if (data.mensagem) {
                    document.getElementById('status-msg').innerText = data.mensagem;
                    if (data.status === 'ok' || data.status === 'erro') clearInterval(monitoramento);
                }
            } catch (err) {}
        }, 3000);
    }
    
    // Inicia no modo limpar para bater com o visual
    setTipo('limpar');
</script>

</body>
</html>
