<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador IBO</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box;}
        .btn-green { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-red { width: 100%; padding: 15px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #progresso { display: none; margin-top: 20px; }
        .bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: #00ff88; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#00ff88">Ativador Digital</h2>
        <div id="form">
            <input type="text" id="mac" placeholder="MAC Address">
            <input type="text" id="key" placeholder="Device Key">
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-green" onclick="enviar(false)">APENAS ATIVAR</button>
            <button class="btn-red" onclick="enviar(true)">LIMPAR NOSSAS PLAYLISTS</button>
        </div>
        <div id="progresso">
            <p id="status">Iniciando...</p>
            <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
        </div>
    </div>
    <script>
        async function enviar(limpar) {
            const mac = document.getElementById('mac').value;
            if(!mac) return alert("Preencha o MAC");
            document.getElementById('form').style.display = 'none';
            document.getElementById('progresso').style.display = 'block';
            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mac, key: document.getElementById('key').value,
                    user: document.getElementById('user').value,
                    pass: document.getElementById('pass').value,
                    limparTudo: limpar
                })
            });
            setInterval(async () => {
                const res = await fetch('/status?mac='+mac);
                const d = await res.json();
                document.getElementById('bar').style.width = (d.concluidos/d.total)*100 + '%';
                document.getElementById('status').innerText = `Processando: ${d.concluidos}/${d.total}`;
            }, 5000);
        }
    </script>
</body>
</html>
