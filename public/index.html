<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium TV Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        .tab-active-green { background-color: #22c55e; color: black; }
        .tab-inactive { background-color: #262626; color: #9ca3af; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800">
        
        <div class="flex justify-center mb-6">
            <img src="logo.png" alt="Imperium TV" class="w-64 h-auto object-contain">
        </div>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setModo('ativar')" id="tab-ativar" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Área do Cliente</button>
            <button onclick="setModo('assinante')" id="tab-assinante" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Playlists</button>
            <button onclick="setModo('limpar')" id="tab-limpar" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Limpar</button>
        </div>

        <div class="space-y-4">
            <div id="area-cliente-content" class="hidden space-y-4">
                <input type="text" id="id-consulta" placeholder="WhatsApp" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e]">
                <button onclick="consultarAssinatura()" class="w-full bg-[#22c55e] text-black font-bold py-3 rounded-lg uppercase text-sm">Verificar Status</button>
                
                <div id="resultado-consulta" class="hidden bg-[#0f0f0f] p-4 rounded-lg border border-gray-800 space-y-3">
                    <div><p class="text-[10px] text-gray-500 uppercase">Cliente</p><p id="res-nome" class="font-bold uppercase text-sm">---</p></div>
                    <div class="grid grid-cols-2 gap-2 border-t border-gray-800 pt-2">
                        <div><p class="text-[10px] text-gray-500 uppercase">Usuário</p><p id="res-user" class="text-[#22c55e] font-bold text-xs">---</p></div>
                        <div><p class="text-[10px] text-gray-500 uppercase">Senha</p><p id="res-pass" class="text-[#22c55e] font-bold text-xs">---</p></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 border-t border-gray-800 pt-2">
                        <div><p class="text-[10px] text-gray-500 uppercase">Servidor</p><p id="res-servidor" class="text-blue-400 font-bold text-[10px]">---</p></div>
                        <div><p class="text-[10px] text-gray-500 uppercase">Valor</p><p id="res-valor" class="font-bold text-[10px]">---</p></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 border-t border-gray-800 pt-2 items-center">
                        <div><p class="text-[10px] text-gray-500 uppercase">Vencimento</p><p id="res-venc" class="text-red-500 font-bold text-[10px]">---</p></div>
                        <div id="container-fatura" class="hidden">
                            <a id="btn-fatura" href="#" target="_blank" class="block bg-yellow-500 hover:bg-yellow-600 text-black text-center font-extrabold py-2 rounded text-[10px] uppercase shadow-lg">
                                💳 PAGAR AGORA
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div id="campos-identificacao">
                <input type="text" id="mac" placeholder="MAC Address" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none mb-2">
                <input type="text" id="key" placeholder="Device Key" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none">
            </div>

            <div id="campos-iptv" class="hidden space-y-2">
                <input type="text" id="usuario" placeholder="Usuário IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none">
                <input type="text" id="senha" placeholder="Senha IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none">
            </div>

            <button id="btn-acao" onclick="processar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg uppercase">Sincronizar</button>
        </div>

        <div id="status-container" class="mt-8 hidden border-t border-gray-800 pt-4 text-center">
            <div class="w-full bg-gray-900 h-2 rounded-full overflow-hidden mb-2">
                <div id="status-barra" class="bg-[#22c55e] h-full transition-all" style="width: 5%"></div>
            </div>
            <p id="status-mensagem" class="text-gray-400 text-[10px] uppercase font-bold">Iniciando...</p>
        </div>
    </div>

    <script>
        let modoAtual = 'assinante';
        let intervaloStatus = null;

        function setModo(m) {
            modoAtual = m;
            document.getElementById('area-cliente-content').classList.toggle('hidden', m !== 'ativar');
            document.getElementById('campos-identificacao').classList.toggle('hidden', m === 'ativar');
            document.getElementById('campos-iptv').classList.toggle('hidden', m !== 'assinante');
            document.getElementById('btn-acao').classList.toggle('hidden', m === 'ativar');
            
            document.getElementById('tab-ativar').className = m === 'ativar' ? 'p-2 rounded-lg tab-active-green font-bold text-[10px] uppercase' : 'p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase';
        }

        async function consultarAssinatura() {
            const id = document.getElementById('id-consulta').value;
            const containerFatura = document.getElementById('container-fatura');
            containerFatura.classList.add('hidden');

            try {
                const res = await fetch(`/api/cliente?id=${id}`);
                const json = await res.json();
                if (json.success) {
                    document.getElementById('res-nome').innerText = json.dados.nome || '---';
                    document.getElementById('res-user').innerText = json.dados.usuario_iptv || '---';
                    document.getElementById('res-pass').innerText = json.dados.senha_iptv || '---';
                    document.getElementById('res-servidor').innerText = json.dados.servidor || '---';
                    document.getElementById('res-valor').innerText = json.dados.valor || '---';
                    document.getElementById('res-venc').innerText = json.dados.vencimento || '---';
                    
                    if (json.dados.link_fatura && json.dados.link_fatura.length > 10) {
                        document.getElementById('btn-fatura').href = json.dados.link_fatura;
                        containerFatura.classList.remove('hidden');
                    }
                    
                    document.getElementById('usuario').value = json.dados.usuario_iptv || '';
                    document.getElementById('senha').value = json.dados.senha_iptv || '';
                    document.getElementById('resultado-consulta').classList.remove('hidden');
                } else alert(json.mensagem);
            } catch (e) { alert("Erro ao consultar dados."); }
        }

        async function processar() {
            const data = { mac: document.getElementById('mac').value, key: document.getElementById('key').value, usuario: document.getElementById('usuario').value, senha: document.getElementById('senha').value, tipo: modoAtual };
            if(!data.mac || !data.key) return alert("MAC e Key obrigatórios");
            document.getElementById('status-container').classList.remove('hidden');
            fetch('/ativar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            iniciarMonitoramento(data.mac);
        }

        function iniciarMonitoramento(mac) {
            if(intervaloStatus) clearInterval(intervaloStatus);
            intervaloStatus = setInterval(async () => {
                const res = await fetch(`/status?mac=${mac}`);
                const s = await res.json();
                document.getElementById('status-mensagem').innerText = s.mensagem;
                if(s.status === "ok" || s.status === "erro") clearInterval(intervaloStatus);
            }, 3000);
        }
        setModo('ativar');
    </script>
</body>
</html>
