<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador Digital</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ativar { background: #00ff88; color: #000; margin-top: 10px; font-size: 1rem; }
        
        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 99; }
        .modal-box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #00ff88; width: 80%; }
        
        /* Progresso */
        #progressArea { display: none; margin-top: 25px; }
        .bar-bg { width: 100%; height: 14px; background: #222; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="modal">
        <div class="modal-box">
            <h3 style="color:#00ff88">Confirme os Dados</h3>
            <div id="resumo" style="text-align:left; font-size:0.9rem; margin-bottom:20px;"></div>
            <div style="display:flex; gap:10px">
                <button style="background:#333; color:#fff" onclick="document.getElementById('modal').style.display='none'">CORRIGIR</button>
                <button style="background:#00ff88; color:#000" onclick="iniciar()">TUDO CERTO!</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="color:#00ff88">Ativador Digital</h2>
        <div id="inputs">
            <input type="text" id="mac" placeholder="MAC (00:00:00:00:00:00)">
            <input type="text" id="key" placeholder="Device Key">
            <input type="text" id="user" placeholder="Usuário IPTV">
            <input type="text" id="pass" placeholder="Senha IPTV">
            <button class="btn-ativar" onclick="conferir()">ATIVAR AGORA</button>
        </div>

        <div id="progressArea">
            <div id="main-status" style="font-weight:bold; color:#00ff88">Aguardando...</div>
            <div id="status-check">
                <div style="font-size:0.8rem; color:#ffbb33; margin-top:10px;">🔍 Verificando login...</div>
                <div class="bar-bg"><div id="bar-check" class="bar-fill" style="background:#ffbb33; width:45%"></div></div>
            </div>
            <div id="status-play" style="display:none">
                <div style="font-size:0.8rem; color:#00ff88; margin-top:10px;">🚀 Enviando Playlists...</div>
                <div class="bar-bg"><div id="bar-play" class="bar-fill" style="background:#00ff88;"></div></div>
            </div>
        </div>
    </div>

    <script>
        function conferir() {
            const mac = document.getElementById('mac').value;
            if(!mac) return alert("Preencha o MAC!");
            document.getElementById('resumo').innerHTML = `<b>MAC:</b> ${mac}<br><b>KEY:</b> ${document.getElementById('key').value}`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function iniciar() {
            document.getElementById('modal').style.display = 'none';
            const mac = document.getElementById('mac').value;
            const key = document.getElementById('key').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            document.getElementById('inputs').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mac, key, user, pass })
            });

            const monitor = setInterval(async () => {
                const res = await fetch(`/status?mac=${mac}`);
                const data = await res.json();

                if(data.status === "erro_login") {
                    clearInterval(monitor);
                    document.getElementById('main-status').innerText = "❌ MAC OU KEY INCORRETOS";
                    document.getElementById('main-status').style.color = "#ff4444";
                    document.getElementById('bar-check').style.width = "100%";
                    document.getElementById('bar-check').style.background = "#ff4444";
                    return;
                }

                if(data.status === "processando" || data.status === "ok") {
                    document.getElementById('status-check').style.display = 'none';
                    document.getElementById('status-play').style.display = 'block';
                    const p = (data.concluidos / data.total) * 100;
                    document.getElementById('bar-play').style.width = p + "%";
                    document.getElementById('main-status').innerText = `Processando: ${data.concluidos}/${data.total}`;
                    if(data.status === "ok") { clearInterval(monitor); document.getElementById('main-status').innerText = "✅ FINALIZADO!"; }
                }
            }, 5000);
        }
    </script>
</body>
</html>
