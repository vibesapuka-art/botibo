<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador Digital Pro</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; background: #00ff88; color: #000; }
        
        #progressArea { display: none; margin-top: 25px; }
        #main-status { font-weight: bold; color: #00ff88; font-size: 1.1rem; }
        .bar-bg { width: 100%; height: 14px; background: #222; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; background: #00ff88; }
        
        #log-real { font-size: 0.85rem; color: #888; margin-top: 10px; font-style: italic; }
        .error-status { color: #ff4444 !important; }
        .error-bar { background: #ff4444 !important; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="titulo" style="color:#00ff88">Ativador Digital</h2>
        
        <div id="form-container">
            <input type="text" id="mac" placeholder="MAC Address">
            <input type="text" id="key" placeholder="Device Key">
            <input type="text" id="user" placeholder="Usuário IPTV">
            <input type="password" id="pass" placeholder="Senha IPTV">
            <button onclick="iniciarAtivacao()">ATIVAR AGORA</button>
        </div>

        <div id="progressArea">
            <div id="main-status">Aguardando...</div>
            <div class="bar-bg">
                <div id="bar" class="bar-fill"></div>
            </div>
            <div id="log-real">O robô está iniciando...</div>
        </div>
    </div>

    <script>
        async function iniciarAtivacao() {
            const mac = document.getElementById('mac').value.trim();
            const key = document.getElementById('key').value.trim();
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if(!mac || !key || !user || !pass) return alert("Preencha tudo!");

            document.getElementById('form-container').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            // Envia o pedido para a fila
            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mac, key, user, pass })
            });

            // Inicia o monitoramento
            const monitor = setInterval(async () => {
                try {
                    const res = await fetch(`/status?mac=${mac}`);
                    const data = await res.json();

                    const statusTxt = document.getElementById('main-status');
                    const logTxt = document.getElementById('log-real');
                    const bar = document.getElementById('bar');

                    if (data.status === "nao_encontrado") return;

                    // Atualiza o Log Real com a mensagem do robô
                    logTxt.innerText = data.mensagem || "Processando...";

                    if (data.status === "processando") {
                        statusTxt.innerText = "ROBÔ EM AÇÃO";
                        bar.style.width = "50%";
                    }

                    if (data.status === "erro") {
                        clearInterval(monitor);
                        statusTxt.innerText = "❌ FALHA";
                        statusTxt.classList.add("error-status");
                        bar.style.width = "100%";
                        bar.classList.add("error-bar");
                        logTxt.innerText = data.mensagem; // Exibe o motivo do erro (ex: MAC inválido)
                    }

                    if (data.status === "ok") {
                        clearInterval(monitor);
                        statusTxt.innerText = "✅ FINALIZADO!";
                        bar.style.width = "100%";
                        logTxt.innerText = "Tudo pronto! Reinicie o aplicativo.";
                    }
                } catch (e) { console.log("Erro de conexão."); }
            }, 3000);
        }
    </script>
</body>
</html>
