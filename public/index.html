<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium Bot IBO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        input { transition: all 0.3s; }
        .tab-active-green { background-color: #22c55e; color: black; }
        .tab-active-blue { background-color: #3b82f6; color: white; }
        .tab-active-red { background-color: #dc2626; color: white; }
        .tab-inactive { background-color: #262626; color: #9ca3af; }
        /* Garante que os placeholders fiquem visíveis no fundo escuro */
        ::placeholder { color: #555 !important; opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold text-[#22c55e] text-center mb-6 italic uppercase tracking-tighter">IMPERIUM BOT IBO</h1>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setModo('ativar')" id="tab-ativar" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Novo</button>
            <button onclick="setModo('assinante')" id="tab-assinante" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Assinante</button>
            <button onclick="setModo('limpar')" id="tab-limpar" class="p-2 rounded-lg tab-active-red font-bold text-[10px] uppercase">Limpar</button>
        </div>

        <div id="form-container" class="space-y-4">
            <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Identificação do Aparelho</p>
            
            <input type="text" id="mac" placeholder="Digite o MAC Address (Ex: 00:AA:BB...)" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">
            <input type="text" id="key" placeholder="Digite o Device Key ou PIN" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">

            <div id="secao-dinamica" class="space-y-4">
                <hr id="divisor" class="border-gray-800 hidden">
                
                <div id="campos-iptv" class="space-y-3 hidden">
                    <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Dados do Servidor</p>
                    <input type="text" id="usuario" placeholder="Usuário IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                    <input type="text" id="senha" placeholder="Senha IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                </div>
            </div>

            <button id="btn-acao" onclick="processar()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg transition-colors uppercase mt-4">
                Executar Limpeza Profunda
            </button>
        </div>

        <div id="status-container" class="mt-8 hidden border-t border-gray-800 pt-6 text-center">
            <p id="status-titulo" class="text-[#22c55e] font-bold text-xl mb-2">PROCESSANDO</p>
            <p id="status-mensagem" class="text-gray-400 text-sm italic">Iniciando sistema...</p>
        </div>
    </div>

    <script>
        let modoAtual = 'limpar';
        let monitoramento = null;

        function setModo(modo) {
            modoAtual = modo;
            const iptv = document.getElementById('campos-iptv');
            const divisor = document.getElementById('divisor');
            const btn = document.getElementById('btn-acao');
            const abas = ['tab-ativar', 'tab-assinante', 'tab-limpar'];

            // Reset de todas as abas para inativo
            abas.forEach(id => document.getElementById(id).className = 'p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase');

            if (modo === 'limpar') {
                iptv.classList.add('hidden');
                divisor.classList.add('hidden');
                btn.innerText = 'Executar Limpeza Profunda';
                btn.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-limpar').className = 'p-2 rounded-lg tab-active-red font-bold text-[10px] uppercase';
            } 
            else {
                iptv.classList.remove('hidden');
                divisor.classList.remove('hidden');
                
                if (modo === 'ativar') {
                    btn.innerText = 'Iniciar Ativação';
                    btn.className = 'w-full bg-[#22c55e] hover:bg-[#16a34a] text-black font-bold py-4 rounded-lg uppercase mt-4';
                    document.getElementById('tab-ativar').className = 'p-2 rounded-lg tab-active-green font-bold text-[10px] uppercase';
                } else {
                    btn.innerText = 'Reativar Cadastro';
                    btn.className = 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                    document.getElementById('tab-assinante').className = 'p-2 rounded-lg tab-active-blue font-bold text-[10px] uppercase';
                }
            }
        }

        async function processar() {
            const mac = document.getElementById('mac').value;
            const key = document.getElementById('key').value;
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;

            if(!mac || !key) return alert("MAC e Key são obrigatórios!");

            // EXIBE A ÁREA DE STATUS SOMENTE AGORA
            document.getElementById('status-container').classList.remove('hidden');
            document.getElementById('status-mensagem').innerText = "Enviando comando para o servidor...";

            try {
                const res = await fetch('/ativar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mac, key, usuario, senha, tipo: modoAtual })
                });

                if(res.ok) {
                    iniciarMonitoramento(mac);
                }
            } catch (e) {
                document.getElementById('status-mensagem').innerText = "Erro ao conectar com o servidor.";
            }
        }

        function iniciarMonitoramento(mac) {
            if(monitoramento) clearInterval(monitoramento);
            monitoramento = setInterval(async () => {
                try {
                    const res = await fetch(`/status?mac=${mac}`);
                    const status = await res.json();
                    if(status.mensagem) {
                        document.getElementById('status-mensagem').innerText = status.mensagem;
                        // Para o monitoramento se houver ícone de conclusão ou erro
                        if(status.status === 'ok' || status.status === 'erro') clearInterval(monitoramento);
                    }
                } catch (err) {}
            }, 3000);
        }

        // Inicia no modo Limpar como padrão visual
        setModo('limpar');
    </script>
</body>
</html>
