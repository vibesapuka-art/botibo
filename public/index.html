<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador IBO Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #00ff88; }
        .form-group { margin-bottom: 12px; }
        input { width: 100%; padding: 12px; border-radius: 8px; background: #252525; color: white; border: 1px solid #333; box-sizing: border-box; }
        button#btnAtivar { width: 100%; padding: 15px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #progressArea { margin-top: 25px; display: none; }
        .bar-bg { width: 100%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .bar-fill { width: 0%; height: 100%; transition: width 0.5s ease; }
        #status-txt { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ativador Digital</h2>
        <div id="formContainer">
            <div class="form-group"><input type="text" id="mac" placeholder="MAC Address"></div>
            <div class="form-group"><input type="text" id="key" placeholder="Device Key"></div>
            <div class="form-group"><input type="text" id="user" placeholder="Usuário"></div>
            <div class="form-group"><input type="password" id="pass" placeholder="Senha"></div>
            <button id="btnAtivar" onclick="enviar()">ATIVAR AGORA</button>
        </div>

        <div id="progressArea">
            <div id="status-txt">Iniciando...</div>
            
            <div id="step-check">
                <div style="font-size: 0.8rem; color: #ffbb33;">🔍 Verificando MAC no painel...</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-check" style="width: 50%; background: #ffbb33;"></div></div>
            </div>

            <div id="step-playlists" style="display: none;">
                <div style="font-size: 0.8rem; color: #00ff88;">🚀 Adicionando Playlists...</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-play" style="background: #00ff88;"></div></div>
            </div>
        </div>
    </div>

    <script>
        async function enviar() {
            const mac = document.getElementById('mac').value;
            const key = document.getElementById('key').value;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mac, key, user, pass })
            });

            monitorar(mac);
        }

        function monitorar(mac) {
            const timer = setInterval(async () => {
                const res = await fetch(`/status?mac=${mac}`);
                const data = await res.json();

                if (data.status === "erro_login") {
                    clearInterval(timer);
                    document.getElementById('status-txt').innerText = "❌ DADOS INCORRETOS!";
                    document.getElementById('bar-check').style.background = "#ff4444";
                    document.getElementById('bar-check').style.width = "100%";
                    alert("O MAC ou Key estão errados. Verifique no seu App.");
                    return;
                }

                if (data.status === "processando" || data.status === "ok") {
                    document.getElementById('step-check').style.display = "none";
                    document.getElementById('step-playlists').style.display = "block";
                    
                    const p = (data.concluidos / data.total) * 100;
                    document.getElementById('bar-play').style.width = p + '%';
                    document.getElementById('status-txt').innerText = `Processando: ${data.concluidos} / ${data.total}`;
                    
                    if (data.status === "ok") {
                        clearInterval(timer);
                        document.getElementById('status-txt').innerText = "✅ FINALIZADO!";
                    }
                }
            }, 5000);
        }
    </script>
</body>
</html>
