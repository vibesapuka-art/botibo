<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium TV Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        input { transition: all 0.3s; }
        .tab-active-blue { background-color: #3b82f6; color: white; }
        .tab-active-red { background-color: #dc2626; color: white; }
        .tab-inactive { background-color: #262626; color: #9ca3af; }
        .tab-active-green { background-color: #22c55e; color: black; }
        ::placeholder { color: #555 !important; opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold text-[#22c55e] text-center mb-6 italic uppercase tracking-tighter">IMPERIUM TV BOT</h1>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setModo('ativar')" id="tab-ativar" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Área do Cliente</button>
            <button onclick="setModo('assinante')" id="tab-assinante" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Adicionar Playlists</button>
            <button onclick="setModo('limpar')" id="tab-limpar" class="p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase">Limpar Playlists</button>
        </div>

        <div id="form-container" class="space-y-4">
            <div id="conteudo-em-breve" class="hidden text-center py-10">
                <p class="text-[#22c55e] font-bold text-xl uppercase tracking-widest">Em breve</p>
            </div>

            <div id="campos-identificacao">
                <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest mb-4">Identificação do Aparelho</p>
                <input type="text" id="mac" placeholder="Digite o MAC Address" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white mb-4">
                <input type="text" id="key" placeholder="Digite o Device Key" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">
            </div>

            <div id="secao-dinamica" class="space-y-4">
                <div id="campos-iptv" class="space-y-3 hidden">
                    <hr class="border-gray-800 my-4">
                    <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Dados do Servidor</p>
                    <input type="text" id="usuario" placeholder="Usuário IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                    <input type="text" id="senha" placeholder="Senha IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                </div>
            </div>

            <button id="btn-acao" onclick="processar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-colors uppercase mt-4">
                Sincronizar Playlists
            </button>
        </div>

        <div id="status-container" class="mt-8 hidden border-t border-gray-800 pt-6">
            <p id="status-titulo" class="text-[#22c55e] font-bold text-center text-sm mb-3 uppercase tracking-widest">Processando</p>
            
            <div class="w-full bg-gray-900 rounded-full h-2 mb-4 overflow-hidden border border-gray-800">
                <div id="status-barra" class="bg-[#22c55e] h-full transition-all duration-700 shadow-[0_0_10px_#22c55e]" style="width: 5%"></div>
            </div>

            <div class="bg-[#0f0f0f] p-4 rounded-lg border border-gray-800 text-center">
                <p id="status-mensagem" class="text-gray-400 text-[11px] italic uppercase font-bold">Iniciando...</p>
            </div>
        </div>
    </div>

    <script>
        let modoAtual = 'assinante';
        let monitoramento = null;

        function setModo(modo) {
            modoAtual = modo;
            const iptv = document.getElementById('campos-iptv');
            const emBreve = document.getElementById('conteudo-em-breve');
            const identificacao = document.getElementById('campos-identificacao');
            const btn = document.getElementById('btn-acao');
            const abas = ['tab-ativar', 'tab-assinante', 'tab-limpar'];

            abas.forEach(id => document.getElementById(id).className = 'p-2 rounded-lg tab-inactive font-bold text-[10px] uppercase');

            if (modo === 'ativar') {
                identificacao.classList.add('hidden');
                iptv.classList.add('hidden');
                emBreve.classList.remove('hidden');
                btn.classList.add('hidden');
                document.getElementById('tab-ativar').className = 'p-2 rounded-lg tab-active-green font-bold text-[10px] uppercase';
            } else if (modo === 'limpar') {
                emBreve.classList.add('hidden');
                identificacao.classList.remove('hidden');
                iptv.classList.add('hidden');
                btn.classList.remove('hidden');
                btn.innerText = 'Limpar Playlist';
                btn.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-limpar').className = 'p-2 rounded-lg tab-active-red font-bold text-[10px] uppercase';
            } else {
                emBreve.classList.add('hidden');
                identificacao.classList.remove('hidden');
                iptv.classList.remove('hidden');
                btn.classList.remove('hidden');
                btn.innerText = 'Sincronizar Playlists';
                btn.className = 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-assinante').className = 'p-2 rounded-lg tab-active-blue font-bold text-[10px] uppercase';
            }
        }

        async function processar() {
            const data = {
                mac: document.getElementById('mac').value,
                key: document.getElementById('key').value,
                usuario: document.getElementById('usuario').value,
                senha: document.getElementById('senha').value,
                tipo: modoAtual
            };

            if(!data.mac || !data.key) return alert("MAC e Key são obrigatórios!");

            document.getElementById('status-container').classList.remove('hidden');
            document.getElementById('status-mensagem').innerText = "📡 ENVIANDO PARA A FILA...";
            document.getElementById('status-barra').style.width = "10%";

            try {
                const res = await fetch('/ativar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) iniciarMonitoramento(data.mac);
            } catch (e) {
                document.getElementById('status-mensagem').innerText = "❌ ERRO DE CONEXÃO.";
            }
        }

        function iniciarMonitoramento(mac) {
            const barra = document.getElementById('status-barra');
            const msgTexto = document.getElementById('status-mensagem');
            const titulo = document.getElementById('status-titulo');

            titulo.innerText = "PROCESSANDO";
            barra.style.width = "5%";
            barra.classList.remove('bg-red-600');
            barra.classList.add('bg-[#22c55e]');

            if(monitoramento) clearInterval(monitoramento);
            
            monitoramento = setInterval(async () => {
                try {
                    const res = await fetch(`/status?mac=${mac}`);
                    const status = await res.json();
                    
                    if(status) {
                        if (status.status === "pendente") {
                            titulo.innerText = "NA FILA DE ESPERA";
                            
                            if (status.naFrente > 0) {
                                msgTexto.innerText = `⏳ EXISTEM ${status.naFrente} PROCESSO(S) NA SUA FRENTE. AGUARDE...`;
                            } else {
                                msgTexto.innerText = "⏳ VOCÊ É O PRÓXIMO! PREPARANDO O MOTOR...";
                            }
                            
                            barra.style.width = "10%";
                            barra.classList.add('animate-pulse');
                        } else {
                            titulo.innerText = "PROCESSANDO";
                            barra.classList.remove('animate-pulse');

                            if (status.mensagem) {
                                msgTexto.innerText = status.mensagem.toUpperCase();

                                if (status.mensagem.includes("ACESSANDO") || status.mensagem.includes("CONECTANDO")) {
                                    barra.style.width = "30%";
                                } 
                                else if (status.mensagem.includes("GRAVANDO") || status.mensagem.includes("EXCLUINDO")) {
                                    barra.style.width = "70%";
                                } 
                            }
                            
                            if (status.status === 'ok') {
                                barra.style.width = "100%";
                                titulo.innerText = "CONCLUÍDO";
                                clearInterval(monitoramento);
                            } 
                            else if (status.status === 'erro' || (status.mensagem && status.mensagem.includes("Erro"))) {
                                barra.style.width = "100%";
                                barra.classList.replace('bg-[#22c55e]', 'bg-red-600');
                                titulo.innerText = "FALHA";
                                clearInterval(monitoramento);
                            }
                        }
                    }
                } catch (err) {
                    console.error("Erro no monitoramento:", err);
                }
            }, 3000);
        }

        setModo('assinante');
    </script>
</body>
</html>
