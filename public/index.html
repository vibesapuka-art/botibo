<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium Bot IBO - Painel de Controle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px; margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #2ecc71; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .nav-pills .nav-link { color: #888; background: #262626; margin: 5px; border-radius: 8px; }
        .nav-pills .nav-link.active { background-color: #e74c3c !important; color: white; }
        .btn-limpar { background-color: #c0392b; border: none; font-weight: bold; padding: 15px; }
        .btn-limpar:hover { background-color: #e74c3c; }
        .status-box { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; margin-top: 30px; }
        .status-title { color: #2ecc71; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .status-msg { color: #bbb; font-size: 0.85rem; font-style: italic; }
        input.form-control { background-color: #222; border: 1px solid #444; color: white; }
        input.form-control:focus { background-color: #2a2a2a; color: white; border-color: #2ecc71; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card text-center">
                <h1>Imperium Bot IBO</h1>
                
                <ul class="nav nav-pills justify-content-center my-4" id="pills-tab" role="tablist">
                    <li class="nav-item"><button class="nav-link" onclick="setTipo('ativar')">NOVO</button></li>
                    <li class="nav-item"><button class="nav-link" onclick="setTipo('ibopro')">ASSINANTE</button></li>
                    <li class="nav-item"><button class="nav-link active" onclick="setTipo('limpar')">LIMPAR</button></li>
                </ul>

                <div class="text-start mb-3">
                    <label class="form-label text-success small fw-bold">IDENTIFICAÇÃO DO APARELHO</label>
                    <input type="text" id="mac" class="form-control mb-2" placeholder="00:00:00:00:00:00">
                    <input type="text" id="key" class="form-control" placeholder="Device Key / Password">
                </div>

                <div id="campos-extra" style="display: none;" class="text-start mb-3">
                    <label class="form-label text-success small fw-bold">DADOS DA LISTA</label>
                    <input type="text" id="usuario" class="form-control mb-2" placeholder="Usuário">
                    <input type="text" id="senha" class="form-control" placeholder="Senha">
                </div>

                <button id="btn-executar" class="btn btn-limpar w-100 mb-3" onclick="enviarComando()">
                    EXECUTAR LIMPEZA PROFUNDA
                </button>

                <div class="status-box">
                    <div class="status-title" id="status-label">PRONTO</div>
                    <div class="status-msg" id="status-msg">Aguardando comando...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let tipoAtual = 'limpar';
    let intervaloStatus = null;

    function setTipo(tipo) {
        tipoAtual = tipo;
        const btn = document.getElementById('btn-executar');
        const extras = document.getElementById('campos-extra');
        
        // Remove active de todos e coloca no clicado
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');

        if (tipo === 'limpar') {
            btn.innerText = 'EXECUTAR LIMPEZA PROFUNDA';
            btn.className = 'btn btn-limpar w-100 mb-3';
            extras.style.display = 'none';
        } else {
            btn.innerText = tipo === 'ativar' ? 'ATIVAR NOVO DISPOSITIVO' : 'RENOVAR ASSINANTE';
            btn.className = 'btn btn-success w-100 mb-3';
            extras.style.display = 'block';
        }
    }

    async function enviarComando() {
        const mac = document.getElementById('mac').value;
        const key = document.getElementById('key').value;
        const usuario = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;

        if (!mac) return alert("Digite o MAC!");

        document.getElementById('status-label').innerText = "PROCESSANDO";
        document.getElementById('status-msg').innerText = "Enviando comando para o servidor...";

        try {
            const res = await fetch('/ativar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac, key, usuario, senha, tipo: tipoAtual })
            });

            const data = await res.json();
            if (data.success) {
                iniciarMonitoramento(mac);
            }
        } catch (err) {
            alert("Erro ao conectar com o servidor.");
        }
    }

    function iniciarMonitoramento(mac) {
        if (intervaloStatus) clearInterval(intervaloStatus);
        
        intervaloStatus = setInterval(async () => {
            try {
                const res = await fetch(`/status?mac=${mac}`);
                const data = await res.json();

                if (data.status !== "nao_encontrado") {
                    document.getElementById('status-label').innerText = data.status.toUpperCase();
                    document.getElementById('status-msg').innerText = data.mensagem;
                    
                    if (data.status === 'ok' || data.status === 'erro') {
                        clearInterval(intervaloStatus);
                    }
                }
            } catch (e) {
                console.error("Erro ao buscar status");
            }
        }, 3000);
    }
</script>

</body>
</html>
