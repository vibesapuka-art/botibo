<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador IBO Player</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        .btn-ativar { width: 100%; padding: 15px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-limpar { width: 100%; padding: 15px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #progressArea { display: none; margin-top: 20px; }
        .bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: #00ff88; transition: 0.5s; }
        .aviso { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; padding: 10px; border-radius: 8px; color: #00ff88; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #00ff88">Ativador Digital</h2>
        <div id="form">
            <input type="text" id="mac" placeholder="MAC Address">
            <input type="text" id="key" placeholder="Device Key">
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ativar" onclick="enviar(false)">APENAS ATIVAR</button>
            <button class="btn-limpar" onclick="enviar(true)">LIMPAR E ATUALIZAR</button>
        </div>
        <div id="progressArea">
            <p id="txt-status">Processando...</p>
            <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
            <div class="aviso" id="aviso">✅ Já pode abrir o App! A primeira playlist foi adicionada.</div>
        </div>
    </div>
    <script>
        async function enviar(limpar) {
            const data = {
                mac: document.getElementById('mac').value,
                key: document.getElementById('key').value,
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value,
                limparTudo: limpar
            };
            if(!data.mac || !data.key) return alert("Preencha os dados!");
            document.getElementById('form').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';
            await fetch('/ativar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            monitorar(data.mac);
        }
        function monitorar(mac) {
            const timer = setInterval(async () => {
                const res = await fetch(`/status?mac=${mac}`);
                const d = await res.json();
                if(d.status === "erro_login") {
                    clearInterval(timer);
                    document.getElementById('txt-status').innerText = "❌ ERRO: MAC OU KEY INVÁLIDOS!";
                    document.getElementById('txt-status').style.color = "red";
                    return;
                }
                const p = (d.concluidos / d.total) * 100;
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('txt-status').innerText = `Playlist: ${d.concluidos} / ${d.total}`;
                if(d.concluidos >= 1) document.getElementById('aviso').style.display = 'block';
                if(d.concluidos >= d.total) {
                    clearInterval(timer);
                    document.getElementById('txt-status').innerText = "✅ FINALIZADO COM SUCESSO!";
                }
            }, 5000);
        }
    </script>
</body>
</html>
