<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador Digital IBO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff88; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ativar { background: #00ff88; color: #000; margin-top: 10px; font-size: 1rem; }
        .btn-ativar:hover { background: #00cc6e; }
        
        /* Modal de Conferência */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #00ff88; width: 85%; max-width: 320px; }
        .modal-box h3 { color: #00ff88; margin-top: 0; }
        .resumo-item { text-align: left; font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* Área de Progresso */
        #progressArea { display: none; margin-top: 25px; }
        #main-status { font-weight: bold; color: #00ff88; margin-bottom: 15px; font-size: 1.1rem; }
        .bar-bg { width: 100%; height: 14px; background: #222; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s ease; }
        
        .status-label { font-size: 0.85rem; margin-top: 10px; display: block; }
        #label-check { color: #ffbb33; } /* Laranja para verificação */
        #label-play { color: #00ff88; }  /* Verde para playlists */
    </style>
</head>
<body>

    <div id="modal">
        <div class="modal-box">
            <h3>Confirme os Dados</h3>
            <div id="resumoContas"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button style="background:#444; color:#fff" onclick="fecharModal()">CORRIGIR</button>
                <button style="background:#00ff88; color:#000" onclick="iniciarProcesso()">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Ativador Digital</h2>
        
        <div id="inputsContainer">
            <input type="text" id="mac" placeholder="MAC (Ex: 00:00:00:00:00:00)">
            <input type="text" id="key" placeholder="Device Key">
            <input type="text" id="user" placeholder="Usuário IPTV">
            <input type="password" id="pass" placeholder="Senha IPTV">
            <button class="btn-ativar" onclick="abrirModal()">ATIVAR AGORA</button>
        </div>

        <div id="progressArea">
            <div id="main-status">Iniciando...</div>
            
            <div id="step-check">
                <span class="status-label" id="label-check">🔍 Verificando MAC no painel...</span>
                <div class="bar-bg"><div id="bar-check" class="bar-fill" style="background: #ffbb33; width: 45%;"></div></div>
            </div>

            <div id="step-play" style="display:none">
                <span class="status-label" id="label-play">🚀 Enviando Playlists...</span>
                <div class="bar-bg"><div id="bar-play" class="bar-fill" style="background: #00ff88;"></div></div>
            </div>
        </div>
    </div>

    <script>
        function abrirModal() {
            const mac = document.getElementById('mac').value;
            const key = document.getElementById('key').value;
            if(!mac || !key) return alert("Por favor, preencha o MAC e a Key.");

            document.getElementById('resumoContas').innerHTML = `
                <div class="resumo-item"><b>MAC:</b> ${mac}</div>
                <div class="resumo-item"><b>KEY:</b> ${key}</div>
                <div class="resumo-item"><b>USER:</b> ${document.getElementById('user').value}</div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function iniciarProcesso() {
            fecharModal();
            const dados = {
                mac: document.getElementById('mac').value,
                key: document.getElementById('key').value,
                user: document.getElementById('user').value,
                pass: document.getElementById('pass').value
            };

            document.getElementById('inputsContainer').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            // Envia para o servidor
            fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            // Inicia monitoramento em tempo real
            monitorarStatus(dados.mac);
        }

        function monitorarStatus(mac) {
            const statusTxt = document.getElementById('main-status');
            const barCheck = document.getElementById('bar-check');
            const barPlay = document.getElementById('bar-play');
            const stepCheck = document.getElementById('step-check');
            const stepPlay = document.getElementById('step-play');

            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`/status?mac=${mac}`);
                    const data = await res.json();

                    // TRATAMENTO DE ERRO DE LOGIN (DADOS INCORRETOS)
                    if (data.status === "erro_login") {
                        clearInterval(poll);
                        statusTxt.innerText = "❌ DADOS INCORRETOS";
                        statusTxt.style.color = "#ff4444";
                        barCheck.style.width = "100%";
                        barCheck.style.background = "#ff4444";
                        document.getElementById('label-check').innerText = "⚠️ MAC ou Key inválidos!";
                        document.getElementById('label-check').style.color = "#ff4444";
                        alert("Ocorreu um erro: O MAC ou a Device Key não foram aceites pelo site. Verifique os dados.");
                        return;
                    }

                    // EVOLUÇÃO PARA ETAPA DE PLAYLISTS
                    if (data.status === "processando" || data.status === "ok") {
                        stepCheck.style.display = "none";
                        stepPlay.style.display = "block";
                        
                        const progresso = (data.concluidos / data.total) * 100;
                        barPlay.style.width = progresso + "%";
                        statusTxt.innerText = `Processando: ${data.concluidos} / ${data.total}`;

                        if (data.status === "ok") {
                            clearInterval(poll);
                            statusTxt.innerText = "✅ FINALIZADO COM SUCESSO!";
                            barPlay.style.width = "100%";
                        }
                    }
                } catch (e) { console.error("Erro na consulta:", e); }
            }, 4000);
        }
    </script>
</body>
</html>
