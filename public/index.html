<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPERIUMTV BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        input { transition: all 0.3s; }
        .tab-active-green { background-color: #22c55e; color: black; }
        .tab-active-blue { background-color: #3b82f6; color: white; }
        .tab-active-red { background-color: #dc2626; color: white; }
        .tab-inactive { background-color: #262626; color: #9ca3af; }
        ::placeholder { color: #555 !important; opacity: 1; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold text-[#22c55e] text-center mb-6 italic uppercase tracking-tighter">IMPERIUMTV BOT</h1>
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setModo('consulta')" id="tab-consulta" class="p-2 rounded-lg tab-inactive font-bold text-[9px] uppercase">Área Cliente</button>
            <button onclick="setModo('mac')" id="tab-mac" class="p-2 rounded-lg tab-inactive font-bold text-[9px] uppercase">Cadastrar MAC</button>
            <button onclick="setModo('limpar')" id="tab-limpar" class="p-2 rounded-lg tab-active-red font-bold text-[9px] uppercase">Limpar</button>
        </div>

        <div id="form-container" class="space-y-4">
            
            <div id="campos-aparelho" class="space-y-4">
                <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Identificação do Aparelho</p>
                <input type="text" id="mac" placeholder="Digite o MAC Address" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">
                <input type="text" id="key" placeholder="Digite o Device Key" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">
            </div>

            <div id="campos-consulta" class="space-y-3 hidden">
                <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Acesso ao Painel</p>
                <input type="text" id="whatsapp_consulta" placeholder="WhatsApp (5544...)" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none focus:border-[#22c55e] text-white">
            </div>

            <div id="secao-dinamica" class="space-y-4">
                <div id="campos-iptv" class="space-y-3 hidden">
                    <hr class="border-gray-800 mb-4">
                    <p class="text-[#22c55e] text-[10px] font-bold uppercase tracking-widest">Dados do Servidor</p>
                    <input type="text" id="usuario" placeholder="Usuário IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                    <input type="text" id="senha" placeholder="Senha IPTV" class="w-full p-3 bg-[#0f0f0f] border border-gray-700 rounded-lg outline-none text-white">
                </div>
            </div>

            <button id="btn-acao" onclick="processar()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg transition-colors uppercase mt-4">
                Executar Limpeza Profunda
            </button>
        </div>

        <div id="status-container" class="mt-8 hidden border-t border-gray-800 pt-6 text-center">
            <p id="status-titulo" class="text-[#22c55e] font-bold text-xl mb-2">RESULTADO</p>
            <div id="status-mensagem" class="text-gray-400 text-sm italic whitespace-pre-line bg-[#0f0f0f] p-4 rounded-lg border border-gray-800 text-left">Iniciando sistema...</div>
        </div>
    </div>

    <script>
        let modoAtual = 'limpar';
        let monitoramento = null;

        function setModo(modo) {
            modoAtual = modo;
            const camposAparelho = document.getElementById('campos-aparelho');
            const camposConsulta = document.getElementById('campos-consulta');
            const iptv = document.getElementById('campos-iptv');
            const btn = document.getElementById('btn-acao');
            const abas = ['tab-consulta', 'tab-mac', 'tab-limpar'];

            // Reseta estilo dos botões
            abas.forEach(id => document.getElementById(id).className = 'p-2 rounded-lg tab-inactive font-bold text-[9px] uppercase');
            document.getElementById('status-container').classList.add('hidden');

            if (modo === 'limpar') {
                camposAparelho.classList.remove('hidden');
                camposConsulta.classList.add('hidden');
                iptv.classList.add('hidden');
                btn.innerText = 'Executar Limpeza Profunda';
                btn.className = 'w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-limpar').className = 'p-2 rounded-lg tab-active-red font-bold text-[9px] uppercase';
            } 
            else if (modo === 'mac') {
                camposAparelho.classList.remove('hidden');
                camposConsulta.classList.add('hidden');
                iptv.classList.remove('hidden');
                btn.innerText = 'Cadastrar no IBO';
                btn.className = 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-mac').className = 'p-2 rounded-lg tab-active-blue font-bold text-[9px] uppercase';
            }
            else if (modo === 'consulta') {
                camposAparelho.classList.add('hidden');
                camposConsulta.classList.remove('hidden');
                iptv.classList.add('hidden');
                btn.innerText = 'Ver Meus Dados';
                btn.className = 'w-full bg-[#22c55e] hover:bg-[#16a34a] text-black font-bold py-4 rounded-lg uppercase mt-4';
                document.getElementById('tab-consulta').className = 'p-2 rounded-lg tab-active-green font-bold text-[9px] uppercase';
            }
        }

        async function processar() {
            const data = {
                mac: document.getElementById('mac').value,
                key: document.getElementById('key').value,
                usuario: document.getElementById('usuario').value,
                senha: document.getElementById('senha').value,
                whatsapp: document.getElementById('whatsapp_consulta').value,
                tipo: modoAtual
            };

            // Validações básicas
            if(modoAtual !== 'consulta' && (!data.mac || !data.key)) return alert("MAC e Key são obrigatórios!");
            if(modoAtual === 'consulta' && !data.whatsapp) return alert("Digite seu WhatsApp!");

            document.getElementById('status-container').classList.remove('hidden');
            document.getElementById('status-mensagem').innerText = "Enviando solicitação...";

            try {
                // ROTA ÚNICA PARA EVITAR ERRO DE CONEXÃO
                const res = await fetch('/ativar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    // Define o ID que o status deve procurar
                    const idBusca = modoAtual === 'consulta' ? data.whatsapp : data.mac;
                    iniciarMonitoramento(idBusca);
                } else {
                    document.getElementById('status-mensagem').innerText = "Erro ao conectar com o servidor.";
                }
            } catch (e) {
                document.getElementById('status-mensagem').innerText = "Erro ao conectar com o bot.";
            }
        }

        function iniciarMonitoramento(id) {
            if(monitoramento) clearInterval(monitoramento);
            monitoramento = setInterval(async () => {
                try {
                    // Pergunta o status para o ID (MAC ou WhatsApp)
                    const res = await fetch(`/status?mac=${id}`);
                    const status = await res.json();
                    
                    if(status.mensagem) {
                        document.getElementById('status-mensagem').innerText = status.mensagem;
                        
                        // Para o loop se o robô terminou (com sucesso ou erro)
                        if(status.status === 'ok' || status.status === 'erro') {
                            clearInterval(monitoramento);
                        }
                    }
                } catch (err) {}
            }, 3000);
        }

        // Inicia no modo limpar por padrão
        setModo('limpar');
    </script>
</body>
</html>
