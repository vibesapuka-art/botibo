<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImperiumTv</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #151515; padding: 25px; border-radius: 15px; width: 380px; text-align: center; border: 1px solid #222; }
        
        .apps-container { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .app-option { border: 2px solid #333; padding: 8px; border-radius: 12px; cursor: pointer; opacity: 0.4; width: 100px; background: #1a1a1a; }
        .app-option img { width: 100%; border-radius: 8px; }
        .app-option.active { border-color: #00ff88; opacity: 1; transform: scale(1.05); }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: #00ff88; color: #000; margin-top: 10px; }
        
        #progressArea, #captchaArea { display: none; margin-top: 20px; }
        .bar-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; width: 0%; background: #00ff88; transition: 0.4s; }
        #img-captcha { width: 180px; border: 2px solid #00ff88; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#00ff88; margin:0;">Ativador Digital</h2>
        <p style="color:#888; font-size: 0.8rem;">Selecione o Aplicativo:</p>
        
        <div class="apps-container">
            <div class="app-option active" id="opt-pro" onclick="selectApp('ibopro')">
                <img src="/logo_pro.png">
                <p style="font-size:10px; margin:5px 0 0 0;">IBO PRO</p>
            </div>
            <div class="app-option" id="opt-com" onclick="selectApp('ibocom')">
                <img src="https://iboplayer.com/logo.png">
                <p style="font-size:10px; margin:5px 0 0 0;">IBO PLAYER</p>
            </div>
        </div>

        <div id="form-ativacao">
            <input type="text" id="mac" placeholder="MAC Address">
            <input type="text" id="key" placeholder="Device Key / Password">
            <input type="text" id="user" placeholder="Usuário IPTV">
            <input type="password" id="pass" placeholder="Senha IPTV">
            <button onclick="iniciar()">INICIAR AGORA</button>
        </div>

        <div id="captchaArea">
            <p style="color:#ffbb33; font-weight:bold; margin-bottom:10px;">Verificação de Segurança</p>
            <img id="img-captcha" src="">
            <input type="text" id="input-captcha" placeholder="Digite o código aqui" style="text-align:center; text-transform:uppercase;">
            <button onclick="enviarCaptcha()" style="background:#fff">CONFIRMAR CÓDIGO</button>
        </div>

        <div id="progressArea">
            <div id="status-main" style="color:#00ff88; font-weight:bold;">Aguardando...</div>
            <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
            <div id="log-msg" style="font-size:12px; color:#aaa;">Iniciando robô...</div>
        </div>
    </div>

    <script>
        let selectedTipo = 'ibopro';

        function selectApp(tipo) {
            selectedTipo = tipo;
            document.getElementById('opt-pro').classList.toggle('active', tipo === 'ibopro');
            document.getElementById('opt-com').classList.toggle('active', tipo === 'ibocom');
        }

        async function iniciar() {
            const mac = document.getElementById('mac').value.trim();
            if(!mac) return alert("Preencha o MAC");

            document.getElementById('form-ativacao').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';

            await fetch('/ativar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mac, key: document.getElementById('key').value,
                    user: document.getElementById('user').value,
                    pass: document.getElementById('pass').value,
                    tipo: selectedTipo
                })
            });
            monitorar(mac);
        }

        function monitorar(mac) {
            const timer = setInterval(async () => {
                const res = await fetch(`/status?mac=${mac}`);
                const data = await res.json();

                // LÓGICA DE EXIBIÇÃO DO CAPTCHA
                if(data.status === "aguardando_captcha") {
                    document.getElementById('progressArea').style.display = 'none';
                    document.getElementById('captchaArea').style.display = 'block';
                    document.getElementById('img-captcha').src = data.captchaBase64;
                } else {
                    document.getElementById('captchaArea').style.display = 'none';
                    document.getElementById('progressArea').style.display = 'block';
                }

                document.getElementById('status-main').innerText = data.status.toUpperCase();
                document.getElementById('log-msg').innerText = data.mensagem;
                
                if (data.total > 0) {
                    let p = (data.indiceAtual / data.total) * 100;
                    document.getElementById('bar').style.width = p + "%";
                }

                if(data.status === "ok" || data.status === "erro") {
                    clearInterval(timer);
                    if(data.status === "ok") document.getElementById('bar').style.width = "100%";
                }
            }, 3000);
        }

        async function enviarCaptcha() {
            const mac = document.getElementById('mac').value;
            const texto = document.getElementById('input-captcha').value;
            
            await fetch('/resolver-captcha', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mac, texto })
            });

            document.getElementById('captchaArea').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('log-msg').innerText = "Validando código...";
        }
    </script>
</body>
</html>
